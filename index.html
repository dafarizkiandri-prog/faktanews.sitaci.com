<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedang Dalam Pemeliharaan</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f7f1e3;
            color: #474747;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* Container Animasi Kucing */
        .animation-container {
            position: relative;
            width: 200px;
            height: 180px;
            margin: 0 auto 20px auto;
        }

        /* Animasi Zzz */
        .zzz-container {
            position: absolute;
            top: 10px;
            right: 30px;
            width: 60px;
            height: 60px;
        }

        .zzz {
            position: absolute;
            font-weight: bold;
            color: #b2bec3;
            opacity: 0;
        }

        .z1 {
            font-size: 24px;
            bottom: 5px;
            left: 5px;
            animation: sleep 4s infinite 0s;
        }

        .z2 {
            font-size: 18px;
            bottom: 15px;
            left: 20px;
            animation: sleep 4s infinite 1.5s;
        }

        .z3 {
            font-size: 14px;
            bottom: 25px;
            left: 35px;
            animation: sleep 4s infinite 3s;
        }

        @keyframes sleep {
            0% {
                transform: translate(0, 0) scale(0.8);
                opacity: 0;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translate(15px, -30px) scale(1.2);
                opacity: 0;
            }
        }

        /* Animasi Kucing Bernapas */
        .cat-body-group {
            animation: breathe 3s ease-in-out infinite;
            transform-origin: 100px 120px;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* Animasi Ekor Kucing */
        .cat-tail {
            transform-origin: 45px 125px;
            animation: wag 3s ease-in-out infinite alternate;
        }

        @keyframes wag {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-12deg); }
        }

        /* Teks & Deskripsi */
        h1 {
            font-size: 1.8rem;
            color: #d1ccc0;
            margin-bottom: 15px;
            color: #ffb142;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #706fd3;
            margin-bottom: 25px;
        }

        .status {
            display: inline-block;
            background-color: #ffda79;
            color: #cc8e35;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Info Tambahan */
        .footer-info {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Area Animasi Kucing -->
        <div class="animation-container">
            <!-- Efek Huruf Zzz -->
            <div class="zzz-container">
                <span class="zzz z1">Z</span>
                <span class="zzz z2">z</span>
                <span class="zzz z3">z</span>
            </div>
            
            <!-- Karakter Kucing SVG -->
            <svg class="cat-svg" viewBox="0 0 200 200" width="100%" height="100%">
                <!-- Karpet/Alas Tidur -->
                <ellipse cx="100" cy="140" rx="80" ry="15" fill="#f1f2f6" />
                
                <!-- Grup Tubuh Kucing (Bernapas) -->
                <g class="cat-body-group">
                    <!-- Badan Kucing -->
                    <path d="M40 120 C40 70, 140 70, 140 120 C140 135, 40 135, 40 120 Z" fill="#ffb142" />
                    <!-- Kepala Kucing -->
                    <circle cx="130" cy="100" r="25" fill="#ffb142" />
                    <!-- Telinga Kiri -->
                    <polygon points="110,85 118,60 128,80" fill="#ffb142" />
                    <polygon points="113,83 118,67 125,80" fill="#ff8a80" />
                    <!-- Telinga Kanan -->
                    <polygon points="132,80 142,60 150,85" fill="#ffb142" />
                    <polygon points="135,80 142,67 147,83" fill="#ff8a80" />
                    <!-- Mata Terpejam (Tidur) -->
                    <path d="M118 105 Q123 110 128 105" stroke="#2c3e50" stroke-width="2.5" fill="none" stroke-linecap="round" />
                    <path d="M133 105 Q138 110 143 105" stroke="#2c3e50" stroke-width="2.5" fill="none" stroke-linecap="round" />
                    <!-- Hidung -->
                    <polygon points="129,109 133,109 131,111" fill="#ff8a80" />
                </g>

                <!-- Ekor Kucing (Animasi Wag) -->
                <path class="cat-tail" d="M45 125 C30 120, 12 95, 22 80 C27 75, 37 80, 32 90 C27 100, 45 115, 45 125" fill="#ffb142" />
            </svg>
        </div>

        <!-- Informasi Pemeliharaan -->
        <span class="status">MAINTENANCE MODE</span>
        <h1 style="margin-top: 15px;">Kami Sedang Berbenah</h1>
        <p>
            Website kami sedang menjalani pemeliharaan rutin agar dapat melayani Anda dengan lebih baik. Kucing kami sedang mengawasinya dengan santai, silakan kembali beberapa saat lagi.
        </p>

        <div class="footer-info">
            Hubungi kami: <a href="mailto:admin@domain.com" style="color: #706fd3; text-decoration: none;">admin@domain.com</a>
        </div>
    </div>

</body>
</html>
