<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Maintenance</title>
    <style>
        /* CSS Variables untuk Mempermudah Kustomisasi Warna */
        :root {
            --bg-color: #0a0b10;
            --text-color: #ffffff;
            --text-muted: #8a8f98;
            --primary-glow: #00f0ff; /* Neon Biru */
            --secondary-glow: #ff007f; /* Neon Pink */
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
            padding: 20px;
        }

        /* Dekorasi Cahaya Latar Belakang (Ambient Glow) */
        .bg-light {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: 1;
            pointer-events: none;
        }
        .light-1 {
            background: rgba(0, 240, 255, 0.15);
            top: 20%;
            left: 20%;
        }
        .light-2 {
            background: rgba(255, 0, 127, 0.15);
            bottom: 20%;
            right: 20%;
        }

        /* Container Utama dengan Efek Glassmorphism */
        .container {
            position: relative;
            z-index: 2;
            max-width: 550px;
            width: 100%;
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        /* Area Animasi 3D */
        .scene-3d {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px auto;
            position: relative;
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Kubus Luar */
        .cube-outer {
            width: 120px;
            height: 120px;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotateOuter 14s linear infinite;
        }

        .cube-outer .face {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(0, 240, 255, 0.03);
            border: 2px solid var(--primary-glow);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        /* Kubus Dalam */
        .cube-inner {
            width: 60px;
            height: 60px;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotateInner 8s linear infinite;
        }

        .cube-inner .face-inner {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 0, 127, 0.05);
            border: 1.5px solid var(--secondary-glow);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        /* Posisi Sisi Kubus Luar (3D Transform) */
        .cube-outer .front  { transform: translateZ(60px); }
        .cube-outer .back   { transform: rotateY(180deg) translateZ(60px); }
        .cube-outer .right  { transform: rotateY(90deg) translateZ(60px); }
        .cube-outer .left   { transform: rotateY(-90deg) translateZ(60px); }
        .cube-outer .top    { transform: rotateX(90deg) translateZ(60px); }
        .cube-outer .bottom { transform: rotateX(-90deg) translateZ(60px); }

        /* Posisi Sisi Kubus Dalam (3D Transform) */
        .cube-inner .front  { transform: translateZ(30px); }
        .cube-inner .back   { transform: rotateY(180deg) translateZ(30px); }
        .cube-inner .right  { transform: rotateY(90deg) translateZ(30px); }
        .cube-inner .left   { transform: rotateY(-90deg) translateZ(30px); }
        .cube-inner .top    { transform: rotateX(90deg) translateZ(30px); }
        .cube-inner .bottom { transform: rotateX(-90deg) translateZ(30px); }

        /* Animasi Rotasi */
        @keyframes rotateOuter {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        @keyframes rotateInner {
            0% { transform: rotateX(360deg) rotateY(0deg) rotateZ(360deg); }
            100% { transform: rotateX(0deg) rotateY(-360deg) rotateZ(0deg); }
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-glow);
            margin-bottom: 24px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-glow);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Teks Judul & Deskripsi */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 12px;
            background: linear-gradient(45deg, var(--text-color), #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Progress Bar Pemeliharaan */
        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 65%; /* Anda bisa menyesuaikan angka progres di sini */
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            box-shadow: 0 0 10px var(--primary-glow);
            border-radius: 10px;
            animation: shimmer 2s infinite linear;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Penyesuaian Responsif untuk Perangkat Seluler (Mobile) */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .scene-3d {
                width: 150px;
                height: 150px;
                margin-bottom: 20px;
            }

            /* Mengecilkan Kubus di Layar Kecil agar Tidak Melebihi Batas */
            .cube-outer {
                width: 90px;
                height: 90px;
            }
            .cube-outer .face {
                width: 90px;
                height: 90px;
            }
            .cube-outer .front  { transform: translateZ(45px); }
            .cube-outer .back   { transform: rotateY(180deg) translateZ(45px); }
            .cube-outer .right  { transform: rotateY(90deg) translateZ(45px); }
            .cube-outer .left   { transform: rotateY(-90deg) translateZ(45px); }
            .cube-outer .top    { transform: rotateX(90deg) translateZ(45px); }
            .cube-outer .bottom { transform: rotateX(-90deg) translateZ(45px); }

            .cube-inner {
                width: 45px;
                height: 45px;
            }
            .cube-inner .face-inner {
                width: 45px;
                height: 45px;
            }
            .cube-inner .front  { transform: translateZ(22.5px); }
            .cube-inner .back   { transform: rotateY(180deg) translateZ(22.5px); }
            .cube-inner .right  { transform: rotateY(90deg) translateZ(22.5px); }
            .cube-inner .left   { transform: rotateY(-90deg) translateZ(22.5px); }
            .cube-inner .top    { transform: rotateX(90deg) translateZ(22.5px); }
            .cube-inner .bottom { transform: rotateX(-90deg) translateZ(22.5px); }

            h1 {
                font-size: 1.7rem;
            }

            p {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <!-- Cahaya Latar Belakang -->
    <div class="bg-light light-1"></div>
    <div class="bg-light light-2"></div>

    <div class="container">
        <!-- Area Animasi 3D Double Cube -->
        <div class="scene-3d">
            <!-- Kubus Luar Neon Biru -->
            <div class="cube-outer">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
            <!-- Kubus Dalam Neon Pink -->
            <div class="cube-inner">
                <div class="face-inner front"></div>
                <div class="face-inner back"></div>
                <div class="face-inner right"></div>
                <div class="face-inner left"></div>
                <div class="face-inner top"></div>
                <div class="face-inner bottom"></div>
            </div>
        </div>

        <!-- Indikator Status Aktif -->
        <div class="status-badge">
            <span class="status-dot"></span>
            Sistem Sedang Diperbarui
        </div>

        <!-- Judul -->
        <h1>Under Maintenance</h1>

        <!-- Deskripsi -->
        <p>Kami sedang melakukan pemeliharaan rutin untuk meningkatkan performa, fitur, serta keamanan website kami. Kami akan segera kembali online. Terima kasih atas kesabaran Anda.</p>

        <!-- Progress Bar Simulasi -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="progress-label">
            <span>Progress Pemeliharaan</span>
            <span>65% Selesai</span>
        </div>
    </div>

</body>
</html>
